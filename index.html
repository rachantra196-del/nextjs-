<!DOCTYPE html>
<html>
<head>
  <title>3D Racing Game</title>
  <style>
    body { margin: 0; overflow: hidden; }
  </style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

// Camera
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 5, 10);

// Renderer
const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Light
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(0, 10, 10);
scene.add(light);

// Road
const roadGeometry = new THREE.PlaneGeometry(10, 200);
const roadMaterial = new THREE.MeshPhongMaterial({ color: 0x333333 });
const road = new THREE.Mesh(roadGeometry, roadMaterial);
road.rotation.x = -Math.PI / 2;
scene.add(road);

// Car (player)
const carGeometry = new THREE.BoxGeometry(1, 1, 2);
const carMaterial = new THREE.MeshPhongMaterial({ color: 0xff0000 });
const car = new THREE.Mesh(carGeometry, carMaterial);
car.position.y = 0.5;
car.position.z = 5;
scene.add(car);

// Obstacles
let obstacles = [];

function createObstacle() {
  const geo = new THREE.BoxGeometry(1, 1, 2);
  const mat = new THREE.MeshPhongMaterial({ color: 0xffffff });
  const obs = new THREE.Mesh(geo, mat);

  obs.position.x = (Math.random() - 0.5) * 6;
  obs.position.y = 0.5;
  obs.position.z = -50;

  scene.add(obs);
  obstacles.push(obs);
}

setInterval(createObstacle, 1500);

// Controls
document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowLeft") car.position.x -= 0.5;
  if (e.key === "ArrowRight") car.position.x += 0.5;
});

// Collision detection
function checkCollision(a, b) {
  return (
    Math.abs(a.position.x - b.position.x) < 1 &&
    Math.abs(a.position.z - b.position.z) < 2
  );
}

// Game loop
function animate() {
  requestAnimationFrame(animate);

  obstacles.forEach((obs, i) => {
    obs.position.z += 0.5;

    if (checkCollision(car, obs)) {
      alert("Game Over!");
      location.reload();
    }

    if (obs.position.z > 10) {
      scene.remove(obs);
      obstacles.splice(i, 1);
    }
  });

  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
