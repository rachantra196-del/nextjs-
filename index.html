<!DOCTYPE html>
<html>
<head>
  <title>3D Runner Game</title>
  <style>
    body { margin: 0; overflow: hidden; font-family: Arial; }
    #ui {
      position: absolute;
      top: 20px;
      left: 20px;
      color: white;
      z-index: 10;
    }
  </style>
</head>
<body>

<div id="ui">
  <input id="nameInput" placeholder="Enter your name" />
  <button onclick="startGame()">Start</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
let scene, camera, renderer, player, playerNameMesh;
let obstacles = [];
let playerName = "Player";
let started = false;

// Init scene
scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 6, 10);

renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Light
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(0, 10, 10);
scene.add(light);

// Ground
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(10, 200),
  new THREE.MeshPhongMaterial({ color: 0x444444 })
);
ground.rotation.x = -Math.PI / 2;
scene.add(ground);

// Create simple human (stick-like)
function createPlayer() {
  const group = new THREE.Group();

  const body = new THREE.Mesh(
    new THREE.BoxGeometry(0.8, 1.5, 0.5),
    new THREE.MeshPhongMaterial({ color: 0x00ffcc })
  );
  body.position.y = 1;

  const head = new THREE.Mesh(
    new THREE.SphereGeometry(0.4),
    new THREE.MeshPhongMaterial({ color: 0xffcc99 })
  );
  head.position.y = 2;

  group.add(body);
  group.add(head);

  group.position.z = 5;
  scene.add(group);

  return group;
}

// Create text label
function createNameLabel(text) {
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = 256;
  canvas.height = 64;

  ctx.fillStyle = "white";
  ctx.font = "30px Arial";
  ctx.fillText(text, 10, 40);

  const texture = new THREE.CanvasTexture(canvas);
  const material = new THREE.SpriteMaterial({ map: texture });

  const sprite = new THREE.Sprite(material);
  sprite.scale.set(3, 1, 1);

  return sprite;
}

// Start game
function startGame() {
  playerName = document.getElementById("nameInput").value || "Player";
  document.getElementById("ui").style.display = "none";

  player = createPlayer();

  playerNameMesh = createNameLabel(playerName);
  playerNameMesh.position.y = 3;
  player.add(playerNameMesh);

  started = true;
}

// Obstacles
function createObstacle() {
  if (!started) return;

  const obs = new THREE.Mesh(
    new THREE.BoxGeometry(1, 1, 1),
    new THREE.MeshPhongMaterial({ color: 0xff0000 })
  );

  obs.position.x = (Math.random() - 0.5) * 6;
  obs.position.y = 0.5;
  obs.position.z = -50;

  scene.add(obs);
  obstacles.push(obs);
}

setInterval(createObstacle, 1500);

// Controls
document.addEventListener("keydown", (e) => {
  if (!started) return;

  if (e.key === "ArrowLeft") player.position.x -= 0.5;
  if (e.key === "ArrowRight") player.position.x += 0.5;
});

// Collision
function checkCollision(a, b) {
  return (
    Math.abs(a.position.x - b.position.x) < 1 &&
    Math.abs(a.position.z - b.position.z) < 1
  );
}

// Game loop
function animate() {
  requestAnimationFrame(animate);

  if (started) {
    obstacles.forEach((obs, i) => {
      obs.position.z += 0.5;

      if (checkCollision(player, obs)) {
        alert(playerName + " crashed!");
        location.reload();
      }

      if (obs.position.z > 10) {
        scene.remove(obs);
        obstacles.splice(i, 1);
      }
    });
  }

  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
